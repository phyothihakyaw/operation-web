      description: |
        Returns a paginated list of approved instructors that learners can explore and book sessions with.
        Only instructors whose account is active are returned.

        `category_id`, `topic_id`, `language`, and `search` compose with AND semantics and with
        pagination: the `total` in the response always reflects the fully filtered set,
        independent of `limit`/`offset`.
      parameters:
        - in: query
          name: limit
          description: Number of items to return. Defaults to 20, max 100.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          description: Number of items to skip.
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: category_id
          description: Only return instructors offering at least one topic under this category.
          schema:
            type: string
            format: uuid
        - in: query
          name: topic_id
          description: |
            Only return instructors who directly offer this topic. If `category_id` is also
            given, the topic must belong to that category or the request fails with 400 category_topic_mismatch.
          schema:
            type: string
            format: uuid
        - in: query
          name: language
          description: Only return instructors who teach in this ISO 639-1 language code.
          schema:
            type: string
        - in: query
          name: search
          description: Case-insensitive substring match against instructor full name and bio.
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of verified instructors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifiedInstructorsListResponse"
        "400":
          description: Malformed or unknown category_id/topic_id/language, or a category/topic combination that doesn't match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidCategoryId:
                  summary: Malformed category_id
                  value:
                    error:
                      code: INVALID_REQUEST
                      message: invalid category_id
                unknownCategory:
                  summary: category_id does not exist
                  value:
                    error:
                      code: INVALID_CATEGORY
                      message: unknown category_id
                unknownTopic:
                  summary: topic_id does not exist
                  value:
                    error:
                      code: INVALID_TOPIC
                      message: unknown topic_id
                unknownLanguage:
                  summary: language does not exist
                  value:
                    error:
                      code: INVALID_LANGUAGE
                      message: unknown language
                categoryTopicMismatch:
                  summary: topic_id does not belong to category_id
                  value:
                    error:
                      code: CATEGORY_TOPIC_MISMATCH
                      message: topic does not belong to category
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/instructor/availability/template:
    get:
      tags:
        - Instructor Availability
      summary: Get my availability template
      description: |
        Returns the caller's live weekly availability template. Block times are
        in the instructor's own timezone (see `timezone` on their instructor
        profile) and on a 30-minute grid. An instructor with no template
        defined yet returns an empty `blocks` array rather than an error.
      security:
        - CookieAuth: []
      responses:
        "200":
          description: The caller's availability template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityTemplateResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller has no approved instructor application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"
    put:
      tags:
        - Instructor Availability
      summary: Replace my availability template
      description: |
        Full-replace: the submitted `blocks` become the entire template.
        Blocks must be on the 30-minute grid and must not overlap another
        block on the same weekday within the same submission — if any block
        fails validation, nothing is written. Saving a new template only
        affects future slot generation; it never alters already-generated
        bookable results.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityTemplateRequest"
      responses:
        "200":
          description: The saved availability template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityTemplateResponse"
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller has no approved instructor application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation failed (off-grid block, or overlapping blocks on the same weekday)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/instructor/availability/settings:
    get:
      tags:
        - Instructor Availability
      summary: Get my availability settings
      description: |
        Returns the caller's bookable horizon (how many days ahead learners
        can book). Defaults to 14 days if the instructor hasn't set one.
      security:
        - CookieAuth: []
      responses:
        "200":
          description: The caller's availability settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySettingsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller has no approved instructor application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"
    put:
      tags:
        - Instructor Availability
      summary: Set my bookable horizon
      description: |
        Sets how many days ahead learners can book this instructor.
        `bookable_horizon_days` must be one of 7, 14, or 28. Changing it only
        affects future slot generation; already-generated bookable results
        and any existing holds or Booking Slots are untouched.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilitySettingsRequest"
      responses:
        "200":
          description: The saved availability settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySettingsResponse"
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller has no approved instructor application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: bookable_horizon_days is not one of the allowed values (7, 14, 28)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/instructor/availability/blocked-dates:
    get:
      tags:
        - Instructor Availability
      summary: List my blocked dates
      description: |
        Returns the caller's blocked dates, ascending. Blocking a date never
        removes or alters an existing Booking Slot, and never affects a slot
        currently held by an in-progress checkout — it only excludes that
        date from future slot generation.
      security:
        - CookieAuth: []
      responses:
        "200":
          description: The caller's blocked dates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedDatesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller has no approved instructor application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"
    post:
      tags:
        - Instructor Availability
      summary: Block a date
      description: |
        Blocking the same date twice is safe to retry — it returns the same
        blocked-date resource rather than erroring.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlockedDateRequest"
      responses:
        "201":
          description: The blocked date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedDate"
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller has no approved instructor application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: date is not a valid calendar date in YYYY-MM-DD form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/instructor/availability/blocked-dates/{id}:
    delete:
      tags:
        - Instructor Availability
      summary: Remove a blocked date
      security:
        - CookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid blocked date id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller has no approved instructor application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Blocked date not found, or does not belong to the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/admin/platform-settings:
    get:
      tags:
        - Admin
      summary: Get platform settings
      description: |
        Admin-only. Returns the single platform-wide settings resource,
        currently just the minimum notice window applied when computing
        bookable slots (replaces the old D-2 rule) and reused as the
        late-cancellation cutoff.
      security:
        - CookieAuth: []
      responses:
        "200":
          description: The current platform settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettingsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"
    put:
      tags:
        - Admin
      summary: Update platform settings
      description: |
        Admin-only. Sets `minimum_notice_hours`: a plain instant comparison
        (`now + minimum_notice_hours <= slot_start_utc`) applied when
        computing bookable slots, with no calendar-day or timezone logic.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSettingsRequest"
      responses:
        "200":
          description: The saved platform settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettingsResponse"
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: minimum_notice_hours must be non-negative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: Official product auth mechanism for the web frontend. Cookie is HttpOnly and same-site.

  responses:
    RequestTimeoutResponse:
      description: Request timed out before completion.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            timeout:
              summary: Request timeout
              value:
                error:
                  code: REQUEST_TIMEOUT
                  message: request timed out

  schemas:
    AccountType:
      type: string
      description: Product persona for a user.
      enum: [learner, instructor]
      example: learner

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: User email address.
          example: alice@example.com
        password:
          type: string
          minLength: 8
          description: Plaintext password (minimum 8 characters).
          example: correct-horse-battery-staple
      additionalProperties: false

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: One-time verification token.
          example: "<token>"
      additionalProperties: false

    ResendVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Email address to send a new verification email to.
          example: alice@example.com
      additionalProperties: false

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          minLength: 8
      additionalProperties: false

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          description: Status indicator.
          enum: [ok, verification_required]
          example: ok
      required: [status]
      additionalProperties: false

    LoginResponse:
      type: object
      properties:
        status:
          type: string
          description: Status indicator.
          enum: [ok]
          example: ok
        verified:
          type: boolean
          description: Whether the signed-in user's email is verified.
          example: true
        account_type:
          type: string
          description: |
            The signed-in account's persona. Empty string for admin accounts, which have
            no persona. Lets the frontend redirect to the right destination without a
            separate `/me` call.
          enum: ["", learner, instructor]
          example: learner
        access_role:
          type: string
          description: The signed-in account's privilege level.
          enum: [user, admin]
          example: user
      required: [status, verified, account_type, access_role]
      additionalProperties: false

    MeResponse:
      type: object
      description: Role-agnostic profile for the authenticated user.
      properties:
        id:
          type: string
          format: uuid
          example: 8f14e45f-ceea-4d7a-bd44-baa3c8dd63f0
        email:
          type: string
          format: email
          example: alice@example.com
        first_name:
          type: string
          example: Alice
        last_name:
          type: string
          example: Nguyen
        account_type:
          $ref: "#/components/schemas/AccountType"
        access_role:
          type: string
          description: Privilege level (separate from account_type persona).
          enum: [user, admin]
          example: user
        status:
          type: string
          enum: [pending_verification, active, disabled]
          example: active
        email_verified:
          type: boolean
          example: true
      required:
        [
          id,
          email,
          first_name,
          last_name,
          account_type,
          access_role,
          status,
          email_verified,
        ]
      additionalProperties: false

    UpdateMeRequest:
      type: object
      required: [first_name, last_name]
      properties:
        first_name:
          type: string
          example: Alice
        last_name:
          type: string
          example: Nguyen
      additionalProperties: false

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          description: Status indicator.
          enum: [ok]
          example: ok
        checks:
          type: object
          additionalProperties:
            type: string
          example:
            db: ok
      required: [status, checks]
      additionalProperties: false

    CategoryListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    Category:
      type: object
      required:
        - id
        - slug
        - title
        - topics
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        topics:
          type: array
          items:
            $ref: "#/components/schemas/Topic"

    Topic:
      type: object
      required:
        - id
        - slug
        - title
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string

    LanguageListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Language"

    Language:
      type: object
      required:
        - alpha2
        - name
      properties:
        alpha2:
          type: string
          description: ISO 639-1 language code.
          example: en
        name:
          type: string
          example: English

    CountryListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Country"

    Country:
      type: object
      required:
        - alpha2
        - numeric_code
        - name
        - dial_codes
      properties:
        alpha2:
          type: string
          description: ISO 3166-1 alpha-2 country code.
          example: US
        numeric_code:
          type: string
          description: ISO 3166-1 numeric country code.
          example: "840"
        name:
          type: string
          example: United States of America
        dial_codes:
          type: array
          description: E.164 dial code(s) for this country. A country may have more than one.
          items:
            type: string
          example: ["+1"]

    TimezoneListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Timezone"

    Timezone:
      type: object
      required:
        - iana_name
        - utc_offset
        - display_name
      properties:
        iana_name:
          type: string
          example: America/New_York
        utc_offset:
          type: string
          example: "UTC-04:00"
        display_name:
          type: string
          example: Eastern Time (US and Canada)

    BasicInfoRequest:
      type: object
      properties:
        current_step:
          type: integer
          minimum: 1
          maximum: 4
        phone_country_code:
          type: string
        phone_number:
          type: string
        gender:
          type: string
          enum:
            - male
            - female
            - other
            - prefer_not_to_say
        date_of_birth:
          type: string
          format: date
        country_of_residence:
          type: string
          description: ISO 3166-1 alpha-2 country of residence -- drives legal jurisdiction and the Stripe Connect Express account country.
        profile_image_url:
          type: string
          format: uri
        intro_video_url:
          type: string
          format: uri
        bio:
          type: string
        taught_languages:
          type: array
          description: ISO 639-1 alpha-2 codes of the languages the instructor teaches in. Full-replace on save.
          items:
            type: string
      additionalProperties: false

    SubjectsRequest:
      type: object
      properties:
        current_step:
          type: integer
          minimum: 1
          maximum: 4
        topic_ids:
          type: array
          items:
            type: string
            format: uuid
      additionalProperties: false

    ExperienceRequest:
      type: object
      properties:
        current_step:
          type: integer
          minimum: 1
          maximum: 4
        employment:
          type: array
          items:
            $ref: "#/components/schemas/EmploymentItem"
        education:
          type: array
          items:
            $ref: "#/components/schemas/EducationItem"
        certificates:
          type: array
          items:
            $ref: "#/components/schemas/CertificateItem"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectItem"
      additionalProperties: false

    AvailabilityRequest:
      type: object
      properties:
        current_step:
          type: integer
          minimum: 1
          maximum: 4
        timezone:
          type: string
          example: Asia/Bangkok
        slots:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilitySlot"
      additionalProperties: false

    OnboardingLinkRequest:
      type: object
      required:
        - return_url
      properties:
        return_url:
          type: string
          format: uri
          description: Absolute URL the instructor is redirected to after completing (or leaving) Stripe Connect onboarding.
        refresh_url:
          type: string
          format: uri
          description: Absolute URL the instructor is redirected to if the onboarding link has expired or was already visited. Defaults to return_url if omitted.
      additionalProperties: false

    OnboardingLinkResponse:
      type: object
      required:
        - onboarding_url
      properties:
        onboarding_url:
          type: string
          format: uri
          description: Single-use, short-lived hosted onboarding URL. Request a fresh one for each onboarding attempt.
      additionalProperties: false

    InstructorApplication:
      type: object
      required:
        - id
        - user_id
        - status
        - current_step
        - connect_account_status
        - selected_topic_ids
        - taught_languages
        - employment
        - education
        - certificates
        - projects
        - availability
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - draft
            - pending
            - reviewing
            - approved
            - rejected
        current_step:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        phone_country_code:
          type: string
        phone_number:
          type: string
        gender:
          type: string
          nullable: true
        date_of_birth:
          type: string
          format: date
          nullable: true
        country_of_residence:
          type: string
        profile_image_url:
          type: string
        intro_video_url:
          type: string
        bio:
          type: string
        timezone:
          type: string
        stripe_connect_account_id:
          type: string
          nullable: true
          description: Stripe Connect Express account ID. Internal identifier only -- never surface "Stripe" or "connect account" in instructor-facing UI copy.
        connect_account_status:
          type: string
          enum:
            - unverified
            - pending
            - verified
            - rejected
          description: Payout method verification state, tracked separately from application approval status.
        selected_topic_ids:
          type: array
          items:
            type: string
            format: uuid
        taught_languages:
          type: array
          items:
            type: string
        employment:
          type: array
          items:
            $ref: "#/components/schemas/EmploymentItemResponse"
        education:
          type: array
          items:
            $ref: "#/components/schemas/EducationItemResponse"
        certificates:
          type: array
          items:
            $ref: "#/components/schemas/CertificateItemResponse"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectItemResponse"
        availability:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilitySlotResponse"
        submitted_at:
          type: string
          format: date-time
          nullable: true
        review_started_at:
          type: string
          format: date-time
          nullable: true
        terms_version:
          type: string
          nullable: true
          description: Identifier of the instructor agreement version accepted at submission. Null until the application has been submitted at least once.
        terms_accepted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SubmitApplicationRequest:
      type: object
      required:
        - accept_terms
      properties:
        accept_terms:
          type: boolean
          description: Must be true. Confirms the instructor accepts the current instructor agreement, including the liability and mandatory-refund clause for fraudulent supporting documents.
      additionalProperties: false

    SubmitApplicationResponse:
      type: object
      required:
        - status
        - message
        - application
      properties:
        status:
          type: string
          enum:
            - pending
        message:
          type: string
        application:
          $ref: "#/components/schemas/InstructorApplication"

    EmploymentItem:
      type: object
      required:
