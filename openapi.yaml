  /v1/admin/applications:
    get:
      tags:
        - Admin
      summary: List instructor applications
      description: |
        Returns a paginated list of instructor applications, ordered by `created_at`
        descending. All filters are optional and combine with AND; omitting `status`
        returns applications in every status.
      security:
        - CookieAuth: []
      parameters:
        - in: query
          name: status
          description: Filter to a single application status. Omit to return all statuses.
          schema:
            type: string
            enum:
              - draft
              - pending
              - reviewing
              - approved
              - rejected
        - in: query
          name: created_after
          description: Only include applications created at or after this instant (RFC 3339).
          schema:
            type: string
            format: date-time
        - in: query
          name: created_before
          description: Only include applications created at or before this instant (RFC 3339).
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          description: Number of items to return. Defaults to 20, max 100.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: offset
          description: Number of items to skip.
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated list of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationSummaryListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
