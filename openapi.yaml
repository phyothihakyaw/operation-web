openapi: 3.0.0

info:
  title: Learnwu API
  version: 0.3.0
  description: |
    API contract for Learnwu.

    Notes:
    - Public endpoints are versioned under /v1.
    - The only auth mechanism is the HttpOnly `access_token` cookie.
    - Access tokens are backed by persisted server-side sessions and can be revoked before JWT expiry.
    - Cookie auth is same-site only in the current deployment model (`SameSite=Strict`).
    - CSRF tokens are not implemented in this repo today; add them before introducing cross-site browser requests with cookie auth.
    - In local development, this spec is served at GET /openapi.yaml and Swagger UI at GET /docs.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.dev.learnwu.com
    description: Dev environment

tags:
  - name: System
    description: Health and operational endpoints.
  - name: Auth
    description: Registration, email verification, login, logout, and OAuth.
  - name: Catalog
    description: Shared read-only master data -- course categories/topics and reference data (languages, countries, timezones).
  - name: Instructor Onboarding
    description: Instructor onboarding draft and submission endpoints.
  - name: Instructor Directory
    description: Public discovery of verified instructors.
  - name: Instructor Availability
    description: |
      Live, ongoing-editable weekly availability template for approved instructors.
      Separate from the onboarding availability draft (Instructor Onboarding tag),
      which is locked once an application enters review and is only ever a
      one-time seed for this template on approval.
  - name: Admin
    description: Admin-only endpoints for reviewing instructor applications and platform-wide settings.
  - name: Webhooks
    description: Inbound webhooks from third-party providers. Not cookie-authenticated -- verified by provider signature instead.

paths:
  /livez:
    get:
      tags: [System]
      summary: Liveness check
      description: Returns 200 when the API process is running.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  summary: Live
                  value:
                    status: ok

  /readyz:
    get:
      tags: [System]
      summary: Readiness check
      description: Returns 200 when the API and required dependencies are ready to serve traffic.
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              examples:
                ready:
                  summary: Database ready
                  value:
                    status: ok
                    checks:
                      db: ok
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                dbNotReady:
                  summary: Database not ready
                  value:
                    error:
                      code: NOT_READY
                      message: database not ready
                      details:
                        check: db

  /metrics:
    get:
      tags: [System]
      summary: Metrics endpoint
      description: |
        Returns in-process HTTP metrics in Prometheus text exposition format.

        Outside `dev` and `test`, this endpoint requires `Authorization: Bearer <HTTP_METRICS_BEARER_TOKEN>`.
      responses:
        "200":
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Missing or invalid metrics bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/register/learner:
    post:
      tags: [Auth]
      summary: Register learner (email/password)
      description: |
        Creates a user account and sends an email verification link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              learner:
                summary: Learner registration
                value:
                  email: alice@example.com
                  password: correct-horse-battery-staple
      responses:
        "202":
          description: Account created; email verification required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                verificationRequired:
                  summary: Verification required
                  value:
                    status: verification_required
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidJson:
                  summary: Malformed JSON
                  value:
                    error:
                      code: INVALID_JSON
                      message: invalid json
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidEmail:
                  summary: Invalid email
                  value:
                    error:
                      code: INVALID_EMAIL
                      message: invalid email
                passwordTooShort:
                  summary: Password too short
                  value:
                    error:
                      code: PASSWORD_TOO_SHORT
                      message: password too short
        "409":
          description: Duplicate or account type mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                emailAlreadyRegistered:
                  summary: Email already registered
                  value:
                    error:
                      code: EMAIL_ALREADY_REGISTERED
                      message: An account with this email already exists. Please sign in instead.
                accountTypeMismatch:
                  summary: Existing email with different account type
                  value:
                    error:
                      code: ACCOUNT_TYPE_MISMATCH
                      message: This email is already registered for a different account type.
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                registrationFailed:
                  summary: Registration failed
                  value:
                    error:
                      code: REGISTRATION_FAILED
                      message: registration failed
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/auth/register/instructor:
    post:
      tags: [Auth]
      summary: Register instructor (email/password)
      description: |
        Creates a user account and sends an email verification link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              instructor:
                summary: Instructor registration
                value:
                  email: instructor@example.com
                  password: correct-horse-battery-staple
      responses:
        "202":
          description: Account created; email verification required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                verificationRequired:
                  summary: Verification required
                  value:
                    status: verification_required
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidJson:
                  summary: Malformed JSON
                  value:
                    error:
                      code: INVALID_JSON
                      message: invalid json
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidEmail:
                  summary: Invalid email
                  value:
                    error:
                      code: INVALID_EMAIL
                      message: invalid email
                passwordTooShort:
                  summary: Password too short
                  value:
                    error:
                      code: PASSWORD_TOO_SHORT
                      message: password too short
        "409":
          description: Duplicate or account type mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                emailAlreadyRegistered:
                  summary: Email already registered
                  value:
                    error:
                      code: EMAIL_ALREADY_REGISTERED
                      message: An account with this email already exists. Please sign in instead.
                accountTypeMismatch:
                  summary: Existing email with different account type
                  value:
                    error:
                      code: ACCOUNT_TYPE_MISMATCH
                      message: This email is already registered for a different account type.
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                registrationFailed:
                  summary: Registration failed
                  value:
                    error:
                      code: REGISTRATION_FAILED
                      message: registration failed
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify email (link)
      description: |
        Consumes a one-time verification token passed as a query parameter.

        If `AUTH_VERIFY_EMAIL_REDIRECT_URL` is configured, success redirects the browser to that URL.
      parameters:
        - in: query
          name: token
          required: true
          description: Verification token from the email link.
          schema:
            type: string
      responses:
        "303":
          description: Verified and redirected to configured login page
          headers:
            Location:
              description: Configured `AUTH_VERIFY_EMAIL_REDIRECT_URL` value.
              schema:
                type: string
                format: uri
        "204":
          description: Verified (no redirect configured)
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidOrExpired:
                  summary: Invalid or expired token
                  value:
                    error:
                      code: INVALID_OR_EXPIRED_TOKEN
                      message: invalid or expired token
        "409":
          description: Token already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                alreadyUsed:
                  summary: Token already used
                  value:
                    error:
                      code: TOKEN_ALREADY_USED
                      message: token already used
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                verificationFailed:
                  summary: Verification failed
                  value:
                    error:
                      code: VERIFICATION_FAILED
                      message: verification failed
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"
    post:
      tags: [Auth]
      summary: Verify email (token)
      description: Consumes a one-time verification token passed in the JSON body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
            examples:
              token:
                summary: Verify token
                value:
                  token: "<token>"
      responses:
        "204":
          description: Verified
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidOrExpired:
                  summary: Invalid or expired token
                  value:
                    error:
                      code: INVALID_OR_EXPIRED_TOKEN
                      message: invalid or expired token
        "409":
          description: Token already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                alreadyUsed:
                  summary: Token already used
                  value:
                    error:
                      code: TOKEN_ALREADY_USED
                      message: token already used
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                verificationFailed:
                  summary: Verification failed
                  value:
                    error:
                      code: VERIFICATION_FAILED
                      message: verification failed
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      description: |
        Shared learner/instructor endpoint.

        Resends an email verification link for unverified learner or instructor accounts.

        Always returns 202 for a valid JSON body when the email is unknown or the account is already verified. This avoids leaking account state.

        An account/email can request at most 3 verification resends per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
            examples:
              resend:
                summary: Resend verification
                value:
                  email: alice@example.com
      responses:
        "202":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  summary: Accepted
                  value:
                    status: ok
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidJson:
                  summary: Malformed JSON
                  value:
                    error:
                      code: INVALID_JSON
                      message: invalid json
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                rateLimited:
                  summary: Too many resend attempts
                  value:
                    error:
                      code: RATE_LIMITED
                      message: rate limit exceeded
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Login (email/password)
      description: |
        Logs in a learner or instructor account, creates a persisted server-side session, and
        sets an HttpOnly `access_token` cookie. One endpoint serves both personas -- the
        response's `account_type` tells the frontend which persona this account is, so it can
        redirect accordingly without a separate `/me` round-trip.

        The response also includes `verified` so the frontend can block booking for unverified
        learners while still allowing browsing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              login:
                summary: Login
                value:
                  email: alice@example.com
                  password: correct-horse-battery-staple
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: HttpOnly `access_token` cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                ok:
                  summary: Logged in
                  value:
                    status: ok
                    verified: true
                    account_type: learner
                    access_role: user
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidCredentials:
                  summary: Invalid credentials
                  value:
                    error:
                      code: INVALID_CREDENTIALS
                      message: invalid credentials
        "403":
          description: User disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                userDisabled:
                  summary: User disabled
                  value:
                    error:
                      code: USER_DISABLED
                      message: user disabled
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                loginFailed:
                  summary: Login failed
                  value:
                    error:
                      code: LOGIN_FAILED
                      message: login failed
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/auth/login/admin:
    post:
      tags: [Auth]
      summary: Login (admin)
      description: |
        Login endpoint for admin accounts, kept on its own path so admin-specific policies
        (rate limiting, lockout, alerting) can diverge from the learner/instructor login flow
        without touching it.

        Learner and instructor accounts log in via `POST /v1/auth/login` instead.

        Creates a persisted server-side session and sets an HttpOnly `access_token` cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              login:
                summary: Login
                value:
                  email: alice@example.com
                  password: correct-horse-battery-staple
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: HttpOnly `access_token` cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                ok:
                  summary: Logged in
                  value:
                    status: ok
                    verified: true
                    account_type: ""
                    access_role: admin
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidCredentials:
                  summary: Invalid credentials
                  value:
                    error:
                      code: INVALID_CREDENTIALS
                      message: invalid credentials
        "403":
          description: User disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                userDisabled:
                  summary: User disabled
                  value:
                    error:
                      code: USER_DISABLED
                      message: user disabled
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                loginFailed:
                  summary: Login failed
                  value:
                    error:
                      code: LOGIN_FAILED
                      message: login failed
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revokes the current persisted server-side session and clears the HttpOnly `access_token` cookie.
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: Expires the HttpOnly `access_token` cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                ok:
                  summary: Logged out
                  value:
                    status: ok

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user's profile
      description: |
        Returns identity fields common to both learner and instructor accounts. Role-specific
        profile data (e.g. instructor application/onboarding fields) lives under its own
        `/v1/instructor/...` endpoints.
      security:
        - CookieAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  summary: Missing or invalid session
                  value:
                    error:
                      code: UNAUTHORIZED
                      message: unauthorized
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

    patch:
      tags: [Auth]
      summary: Set the authenticated user's first/last name
      description: |
        Writes directly to `users.first_name`/`users.last_name` -- the single source of truth
        for a user's name across the product (OAuth providers populate it at signup; this is
        how email/password accounts, which don't collect a name at registration, set or correct
        it later). Instructor onboarding and directory listings read the name via this table
        rather than storing their own copy.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidName:
                  summary: Missing first or last name
                  value:
                    error:
                      code: INVALID_NAME
                      message: first name and last name are required
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/RequestTimeoutResponse"

  /v1/auth/oauth/google/start:
    get:
      tags: [Auth]
      summary: Start Google OAuth
      description: Redirects to Google for authentication using a one-time stored state token and PKCE.
      parameters:
        - in: query
          name: account_type
          required: true
          description: Desired account type (`learner` or `instructor`).
          schema:
            $ref: "#/components/schemas/AccountType"
      responses:
        "302":
          description: Redirect to Google
          headers:
            Location:
              description: Google authorization URL.
              schema:
                type: string
                format: uri
        "422":
          description: Invalid account type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidAccountType:
                  summary: Invalid account type
                  value:
                    error:
                      code: INVALID_ACCOUNT_TYPE
                      message: invalid account type
        "500":
          description: Failed to start OAuth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                failed:
                  summary: Failed to start OAuth
                  value:
                    error:
                      code: OAUTH_START_FAILED
                      message: failed to start oauth
        "501":
          description: Not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notConfigured:
                  summary: Not configured
                  value:
                    error:
                      code: OAUTH_NOT_CONFIGURED
                      message: google oauth not configured

  /v1/auth/oauth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback
      description: Validates the stored OAuth state, exchanges the OAuth code with PKCE, sets an HttpOnly `access_token` cookie, and redirects the browser to the frontend login page with role and environment context.
      parameters:
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        "303":
          description: Redirect to the frontend login page after a successful callback.
          headers:
            Location:
              description: Frontend login URL with `role` and `env` query parameters.
              schema:
                type: string
                format: uri-reference
            Set-Cookie:
              description: HttpOnly `access_token` cookie.
              schema:
                type: string
        "400":
          description: Callback error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidState:
                  summary: Invalid state
                  value:
                    error:
                      code: INVALID_OAUTH_STATE
                      message: invalid state
                authorizationFailed:
                  summary: OAuth authorization failed
                  value:
                    error:
                      code: OAUTH_AUTHORIZATION_FAILED
                      message: oauth authorization failed
                missingCode:
                  summary: Missing code
                  value:
                    error:
                      code: MISSING_OAUTH_CODE
                      message: missing code
                exchangeFailed:
                  summary: OAuth exchange failed
                  value:
                    error:
                      code: OAUTH_EXCHANGE_FAILED
                      message: oauth exchange failed
                missingIdToken:
                  summary: Missing id_token
                  value:
                    error:
                      code: MISSING_ID_TOKEN
                      message: missing id_token
                invalidClaims:
                  summary: Invalid claims
                  value:
                    error:
                      code: INVALID_OAUTH_CLAIMS
                      message: invalid claims
                missingEmail:
                  summary: Missing email
                  value:
                    error:
                      code: MISSING_OAUTH_EMAIL
                      message: missing email
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidIdToken:
                  summary: Invalid id_token
                  value:
                    error:
                      code: INVALID_ID_TOKEN
                      message: invalid id_token
        "403":
          description: Email not verified with provider or user disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                providerEmailNotVerified:
                  summary: Provider email not verified
                  value:
                    error:
                      code: EMAIL_NOT_VERIFIED
                      message: email not verified
                userDisabled:
                  summary: User disabled
                  value:
                    error:
                      code: USER_DISABLED
                      message: user disabled
        "409":
          description: Duplicate or account type mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                emailAlreadyRegistered:
                  summary: Email already registered
                  value:
                    error:
                      code: EMAIL_ALREADY_REGISTERED
                      message: An account with this email already exists. Please sign in instead.
                accountTypeMismatch:
                  summary: Existing email with different account type
                  value:
                    error:
                      code: ACCOUNT_TYPE_MISMATCH
                      message: This email is already registered for a different account type.
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                oauthLoginFailed:
                  summary: OAuth login failed
                  value:
